name: Build packages

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-SDL2
      - name: Build and package
        shell: msys2 {0}
        run: sh scripts/package_windows_msys.sh
      - uses: actions/upload-artifact@v5
        with:
          name: TTrans-windows-installer
          path: dist/TTrans-windows-installer.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Build and package
        run: sh scripts/package_linux.sh
      - uses: actions/upload-artifact@v5
        with:
          name: TTrans-linux-elf
          path: dist/TTrans-linux-elf.tar.gz

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: brew install sdl2
      - name: Build and package
        run: sh scripts/package_macos.sh
      - uses: actions/upload-artifact@v5
        with:
          name: TTrans-macos-dmg
          path: dist/TTrans-macos.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "TTrans ${GITHUB_REF_NAME}" \
            --notes "Download TTrans-windows-installer.zip on Windows, unzip it, then double-click install.cmd."
